name: Java CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: 'gradle'
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Build application
      run: ./gradlew bootJar
    
    - name: Start server and run tests
      run: |
        java -jar build/libs/app-mbank.jar &
        SERVER_PID=$!
        sleep 30
        ./gradlew test
        kill $SERVER_PID
